<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>레트로 철인 3종</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&display=swap');

:root {
  --bg-dark: #0a0a12;
  --bg-panel: #12121e;
  --bg-card: #1a1a2e;
  --neon-cyan: #00fff5;
  --neon-pink: #ff006e;
  --neon-yellow: #ffe600;
  --neon-green: #39ff14;
  --neon-orange: #ff6a00;
  --neon-purple: #b026ff;
  --text-main: #e0e0e0;
  --text-dim: #666680;
  --scanline: rgba(0,255,245,0.03);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-dark);
  color: var(--text-main);
  font-family: 'Noto Sans KR', sans-serif;
  overflow-x: hidden;
  min-height: 100vh;
}

/* CRT scanline overlay */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    var(--scanline) 2px,
    var(--scanline) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

.pixel-font { font-family: 'Press Start 2P', cursive; }

/* MAIN MENU */
#main-menu {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.title-block {
  text-align: center;
  margin-bottom: 40px;
}

.title-block h1 {
  font-family: 'Press Start 2P', cursive;
  font-size: clamp(18px, 4vw, 36px);
  color: var(--neon-cyan);
  text-shadow: 0 0 20px rgba(0,255,245,0.5), 0 0 40px rgba(0,255,245,0.2);
  margin-bottom: 12px;
  letter-spacing: 2px;
}

.title-block .subtitle {
  font-size: 14px;
  color: var(--text-dim);
  letter-spacing: 4px;
  text-transform: uppercase;
}

.title-icons {
  display: flex;
  gap: 30px;
  justify-content: center;
  margin: 30px 0;
  flex-wrap: wrap;
}

.title-icon {
  width: 90px;
  height: 90px;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 36px;
  transition: transform 0.3s, box-shadow 0.3s;
}

.title-icon:hover { transform: translateY(-4px); }

.title-icon span {
  font-family: 'Press Start 2P', cursive;
  font-size: 7px;
  color: #fff;
}

.icon-brick {
  background: linear-gradient(135deg, #ff006e33, #ff006e11);
  border: 1px solid var(--neon-pink);
  box-shadow: 0 0 15px rgba(255,0,110,0.2);
}

.icon-bubble {
  background: linear-gradient(135deg, #39ff1433, #39ff1411);
  border: 1px solid var(--neon-green);
  box-shadow: 0 0 15px rgba(57,255,20,0.2);
}

.icon-tetris {
  background: linear-gradient(135deg, #b026ff33, #b026ff11);
  border: 1px solid var(--neon-purple);
  box-shadow: 0 0 15px rgba(176,38,255,0.2);
}

/* Difficulty select */
.diff-select {
  display: flex;
  gap: 12px;
  margin: 20px 0;
  flex-wrap: wrap;
  justify-content: center;
}

.diff-btn {
  font-family: 'Press Start 2P', cursive;
  font-size: 10px;
  padding: 14px 24px;
  border: 2px solid var(--text-dim);
  background: transparent;
  color: var(--text-dim);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.diff-btn:hover, .diff-btn.active {
  border-color: var(--neon-cyan);
  color: var(--neon-cyan);
  box-shadow: 0 0 15px rgba(0,255,245,0.2);
}

.diff-btn.active::before {
  content: '▶';
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 8px;
}

.diff-info {
  background: var(--bg-card);
  border: 1px solid #333;
  border-radius: 12px;
  padding: 16px 24px;
  margin: 16px 0;
  font-size: 13px;
  line-height: 1.8;
  max-width: 500px;
  text-align: left;
  color: var(--text-dim);
}

.diff-info strong {
  color: var(--neon-yellow);
  font-family: 'Press Start 2P', cursive;
  font-size: 9px;
}

.start-btn {
  font-family: 'Press Start 2P', cursive;
  font-size: 14px;
  padding: 18px 48px;
  border: 2px solid var(--neon-yellow);
  background: transparent;
  color: var(--neon-yellow);
  border-radius: 8px;
  cursor: pointer;
  margin-top: 24px;
  transition: all 0.3s;
  text-shadow: 0 0 10px rgba(255,230,0,0.3);
}

.start-btn:hover {
  background: var(--neon-yellow);
  color: var(--bg-dark);
  box-shadow: 0 0 30px rgba(255,230,0,0.4);
}

/* GAME SCREEN */
#game-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 10px;
}

.game-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 700px;
  padding: 10px 0;
  margin-bottom: 8px;
}

.game-title {
  font-family: 'Press Start 2P', cursive;
  font-size: clamp(10px, 2.5vw, 16px);
}

.game-title.brick { color: var(--neon-pink); }
.game-title.bubble { color: var(--neon-green); }
.game-title.tetris { color: var(--neon-purple); }

.game-stats {
  display: flex;
  gap: 16px;
  font-family: 'Press Start 2P', cursive;
  font-size: 9px;
  color: var(--text-dim);
}

.game-stats span em {
  font-style: normal;
  color: var(--neon-cyan);
}

canvas {
  border: 2px solid #333;
  border-radius: 4px;
  background: #000;
  display: block;
  image-rendering: pixelated;
}

.game-controls-hint {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 10px;
  text-align: center;
}

.game-controls-hint kbd {
  background: var(--bg-card);
  border: 1px solid #444;
  border-radius: 4px;
  padding: 2px 7px;
  font-family: 'Press Start 2P', cursive;
  font-size: 8px;
  color: var(--neon-cyan);
}

/* TRANSITION SCREEN */
#transition-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  text-align: center;
}

.trans-result {
  background: var(--bg-card);
  border: 1px solid #333;
  border-radius: 16px;
  padding: 30px 40px;
  margin: 20px 0;
  min-width: 300px;
}

.trans-result h3 {
  font-family: 'Press Start 2P', cursive;
  font-size: 11px;
  margin-bottom: 16px;
  color: var(--neon-yellow);
}

.trans-score {
  font-family: 'Press Start 2P', cursive;
  font-size: 32px;
  color: var(--neon-cyan);
  text-shadow: 0 0 20px rgba(0,255,245,0.4);
}

.trans-score small {
  font-size: 12px;
  color: var(--text-dim);
}

.trans-detail {
  margin-top: 16px;
  font-size: 12px;
  line-height: 2;
  color: var(--text-dim);
  text-align: left;
}

.trans-detail span {
  color: var(--text-main);
  float: right;
}

.next-btn {
  font-family: 'Press Start 2P', cursive;
  font-size: 12px;
  padding: 16px 40px;
  border: 2px solid var(--neon-green);
  background: transparent;
  color: var(--neon-green);
  border-radius: 8px;
  cursor: pointer;
  margin-top: 20px;
  transition: all 0.3s;
}

.next-btn:hover {
  background: var(--neon-green);
  color: var(--bg-dark);
  box-shadow: 0 0 30px rgba(57,255,20,0.3);
}

/* FINAL RESULT */
#final-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

.final-title {
  font-family: 'Press Start 2P', cursive;
  font-size: clamp(14px, 3vw, 24px);
  color: var(--neon-yellow);
  text-shadow: 0 0 20px rgba(255,230,0,0.5);
  margin-bottom: 8px;
}

.final-subtitle {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 30px;
}

.final-cards {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 24px;
}

.final-card {
  background: var(--bg-card);
  border-radius: 16px;
  padding: 24px;
  min-width: 180px;
  text-align: center;
  border: 1px solid #333;
  transition: transform 0.3s;
}

.final-card:hover { transform: translateY(-4px); }

.final-card .fc-icon { font-size: 28px; margin-bottom: 8px; }
.final-card .fc-name {
  font-family: 'Press Start 2P', cursive;
  font-size: 9px;
  color: var(--text-dim);
  margin-bottom: 12px;
}
.final-card .fc-score {
  font-family: 'Press Start 2P', cursive;
  font-size: 28px;
  margin-bottom: 4px;
}
.final-card .fc-max {
  font-size: 11px;
  color: var(--text-dim);
}

.final-card.brick .fc-score { color: var(--neon-pink); }
.final-card.bubble .fc-score { color: var(--neon-green); }
.final-card.tetris .fc-score { color: var(--neon-purple); }

.final-total {
  background: linear-gradient(135deg, var(--bg-card), #1e1e3a);
  border: 2px solid var(--neon-cyan);
  border-radius: 16px;
  padding: 30px 50px;
  text-align: center;
  box-shadow: 0 0 30px rgba(0,255,245,0.1);
  margin-bottom: 20px;
}

.final-total-label {
  font-family: 'Press Start 2P', cursive;
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.final-total-score {
  font-family: 'Press Start 2P', cursive;
  font-size: clamp(36px, 8vw, 56px);
  color: var(--neon-cyan);
  text-shadow: 0 0 30px rgba(0,255,245,0.5);
}

.final-total-score small {
  font-size: 16px;
  color: var(--text-dim);
}

.final-grade {
  font-family: 'Press Start 2P', cursive;
  font-size: 12px;
  margin-top: 10px;
  padding: 6px 16px;
  border-radius: 20px;
  display: inline-block;
}

.grade-s { background: var(--neon-yellow); color: #000; }
.grade-a { background: var(--neon-cyan); color: #000; }
.grade-b { background: var(--neon-green); color: #000; }
.grade-c { background: var(--neon-orange); color: #000; }
.grade-d { background: var(--neon-pink); color: #000; }

.retry-btn {
  font-family: 'Press Start 2P', cursive;
  font-size: 12px;
  padding: 16px 40px;
  border: 2px solid var(--neon-yellow);
  background: transparent;
  color: var(--neon-yellow);
  border-radius: 8px;
  cursor: pointer;
  margin-top: 16px;
  transition: all 0.3s;
}

.retry-btn:hover {
  background: var(--neon-yellow);
  color: var(--bg-dark);
}

/* PROGRESS BAR */
.progress-bar {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 10px;
}

.progress-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 2px solid #444;
  transition: all 0.3s;
}

.progress-dot.done { background: var(--neon-green); border-color: var(--neon-green); box-shadow: 0 0 8px rgba(57,255,20,0.5); }
.progress-dot.current { border-color: var(--neon-cyan); box-shadow: 0 0 8px rgba(0,255,245,0.5); animation: pulse 1s infinite; }

.progress-line {
  width: 40px; height: 2px;
  background: #333;
}

.progress-line.done { background: var(--neon-green); }

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}

/* Mobile touch controls */
.touch-controls {
  display: none;
  gap: 10px;
  margin-top: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.touch-btn {
  width: 56px;
  height: 56px;
  border-radius: 12px;
  border: 2px solid #444;
  background: var(--bg-card);
  color: var(--neon-cyan);
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

.touch-btn:active {
  background: rgba(0,255,245,0.15);
  border-color: var(--neon-cyan);
}

.touch-btn-wide {
  width: 120px;
}

@media (pointer: coarse) {
  .touch-controls { display: flex; }
}

@media (max-width: 500px) {
  .touch-controls { display: flex; }
}

/* Countdown overlay */
.countdown-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  font-family: 'Press Start 2P', cursive;
  font-size: 72px;
  color: var(--neon-cyan);
  text-shadow: 0 0 40px rgba(0,255,245,0.6);
}

.countdown-overlay.hidden { display: none; }
</style>
</head>
<body>

<!-- MAIN MENU -->
<div id="main-menu">
  <div class="title-block">
    <h1>레트로 철인 3종</h1>
    <div class="subtitle">RETRO TRIATHLON</div>
  </div>

  <div class="title-icons">
    <div class="title-icon icon-brick">🧱<span>BRICK</span></div>
    <div class="title-icon icon-bubble">🫧<span>BUBBLE</span></div>
    <div class="title-icon icon-tetris">🟪<span>TETRIS</span></div>
  </div>

  <div class="diff-select">
    <button class="diff-btn" data-diff="easy">입문</button>
    <button class="diff-btn active" data-diff="normal">표준</button>
    <button class="diff-btn" data-diff="hard">익스트림</button>
  </div>

  <div class="diff-info" id="diff-info">
    <strong>▸ 표준 코스</strong><br>
    벽돌 깨기: 15 스테이지<br>
    보글보글: 15 라운드<br>
    테트리스: 레벨 3 시작, 12분 제한
  </div>

  <button class="start-btn" onclick="startTriathlon()">START</button>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div class="progress-bar" id="progress-bar"></div>
  <div class="game-header" id="game-header"></div>
  <canvas id="gameCanvas" width="480" height="560"></canvas>
  <div class="game-controls-hint" id="controls-hint"></div>
  <div class="touch-controls" id="touch-controls"></div>
</div>

<!-- TRANSITION -->
<div id="transition-screen"></div>

<!-- FINAL -->
<div id="final-screen"></div>

<!-- COUNTDOWN -->
<div class="countdown-overlay hidden" id="countdown"></div>

<script>
// ==================== GLOBAL STATE ====================
const DIFF = {
  easy:   { brickStages: 10, bubbleRounds: 10, tetrisLevel: 1, tetrisTime: 600, label: '입문 코스' },
  normal: { brickStages: 15, bubbleRounds: 15, tetrisLevel: 3, tetrisTime: 720, label: '표준 코스' },
  hard:   { brickStages: 20, bubbleRounds: 20, tetrisLevel: 5, tetrisTime: 900, label: '익스트림 코스' },
};

let selectedDiff = 'normal';
let currentGame = 0; // 0=brick, 1=bubble, 2=tetris
let scores = [0, 0, 0];
let details = [{}, {}, {}];
let gameActive = false;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Difficulty buttons
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDiff = btn.dataset.diff;
    const d = DIFF[selectedDiff];
    document.getElementById('diff-info').innerHTML =
      `<strong>▸ ${d.label}</strong><br>벽돌 깨기: ${d.brickStages} 스테이지<br>보글보글: ${d.bubbleRounds} 라운드<br>테트리스: 레벨 ${d.tetrisLevel} 시작, ${Math.floor(d.tetrisTime/60)}분 제한`;
  });
});

function showScreen(id) {
  ['main-menu','game-screen','transition-screen','final-screen'].forEach(s => {
    document.getElementById(s).style.display = 'none';
  });
  document.getElementById(id).style.display = 'flex';
}

function updateProgress() {
  const pb = document.getElementById('progress-bar');
  const names = ['🧱','🫧','🟪'];
  let html = '';
  for (let i = 0; i < 3; i++) {
    const cls = i < currentGame ? 'done' : i === currentGame ? 'current' : '';
    html += `<div class="progress-dot ${cls}""></div>`;
    if (i < 2) html += `<div class="progress-line ${i < currentGame ? 'done' : ''}"></div>`;
  }
  pb.innerHTML = html;
}

async function countdown() {
  const el = document.getElementById('countdown');
  el.classList.remove('hidden');
  for (let i = 3; i >= 1; i--) {
    el.textContent = i;
    await new Promise(r => setTimeout(r, 800));
  }
  el.textContent = 'GO!';
  await new Promise(r => setTimeout(r, 500));
  el.classList.add('hidden');
}

function startTriathlon() {
  currentGame = 0;
  scores = [0, 0, 0];
  details = [{}, {}, {}];
  showScreen('game-screen');
  updateProgress();
  launchGame(0);
}

async function launchGame(idx) {
  currentGame = idx;
  updateProgress();
  await countdown();
  gameActive = true;
  if (idx === 0) startBrickBreaker();
  else if (idx === 1) startBubbleBobble();
  else startTetris();
}

function endCurrentGame(score, detail) {
  gameActive = false;
  scores[currentGame] = score;
  details[currentGame] = detail;

  if (currentGame < 2) {
    showTransition();
  } else {
    showFinal();
  }
}

function showTransition() {
  const names = ['벽돌 깨기', '보글보글', '테트리스'];
  const colors = ['var(--neon-pink)', 'var(--neon-green)', 'var(--neon-purple)'];
  const nextNames = names[currentGame + 1];
  const d = details[currentGame];

  let detailHtml = '';
  for (const [k, v] of Object.entries(d)) {
    detailHtml += `<div>${k} <span>${v}</span></div>`;
  }

  const ts = document.getElementById('transition-screen');
  ts.innerHTML = `
    <div style="font-family:'Press Start 2P';font-size:11px;color:${colors[currentGame]};margin-bottom:8px;">
      ${names[currentGame]} 완료!
    </div>
    <div class="trans-result">
      <h3>종목 점수</h3>
      <div class="trans-score">${scores[currentGame]}<small> / 100</small></div>
      <div class="trans-detail">${detailHtml}</div>
    </div>
    <div style="font-size:13px;color:var(--text-dim);margin:12px 0;">
      다음 종목: <span style="color:${colors[currentGame+1]};font-family:'Press Start 2P';font-size:10px;">${nextNames}</span>
    </div>
    <button class="next-btn" onclick="goNext()">다음 종목 ▶</button>
  `;
  showScreen('transition-screen');
}

function goNext() {
  showScreen('game-screen');
  launchGame(currentGame + 1);
}

function showFinal() {
  const total = scores[0] + scores[1] + scores[2];
  let grade, gradeClass;
  if (total >= 270) { grade = 'S'; gradeClass = 'grade-s'; }
  else if (total >= 220) { grade = 'A'; gradeClass = 'grade-a'; }
  else if (total >= 160) { grade = 'B'; gradeClass = 'grade-b'; }
  else if (total >= 100) { grade = 'C'; gradeClass = 'grade-c'; }
  else { grade = 'D'; gradeClass = 'grade-d'; }

  const fs = document.getElementById('final-screen');
  fs.innerHTML = `
    <div class="final-title">🏆 경기 종료!</div>
    <div class="final-subtitle">${DIFF[selectedDiff].label} 완주</div>
    <div class="final-cards">
      <div class="final-card brick">
        <div class="fc-icon">🧱</div>
        <div class="fc-name">벽돌 깨기</div>
        <div class="fc-score">${scores[0]}</div>
        <div class="fc-max">/ 100</div>
      </div>
      <div class="final-card bubble">
        <div class="fc-icon">🫧</div>
        <div class="fc-name">보글보글</div>
        <div class="fc-score">${scores[1]}</div>
        <div class="fc-max">/ 100</div>
      </div>
      <div class="final-card tetris">
        <div class="fc-icon">🟪</div>
        <div class="fc-name">테트리스</div>
        <div class="fc-score">${scores[2]}</div>
        <div class="fc-max">/ 100</div>
      </div>
    </div>
    <div class="final-total">
      <div class="final-total-label">TOTAL SCORE</div>
      <div class="final-total-score">${total}<small> / 300</small></div>
      <div class="final-grade ${gradeClass}">RANK ${grade}</div>
    </div>
    <button class="retry-btn" onclick="location.reload()">다시 도전</button>
  `;
  showScreen('final-screen');
}


// ==================== GAME 1: BRICK BREAKER ====================
function startBrickBreaker() {
  const diff = DIFF[selectedDiff];
  const maxStages = diff.brickStages;
  canvas.width = 480; canvas.height = 560;

  const gh = document.getElementById('game-header');
  gh.innerHTML = `
    <div class="game-title brick pixel-font">1종목: 벽돌 깨기</div>
    <div class="game-stats">
      <span>STAGE <em id="b-stage">1</em>/${maxStages}</span>
      <span>LIVES <em id="b-lives">3</em></span>
      <span>SCORE <em id="b-score">0</em></span>
    </div>
  `;
  document.getElementById('controls-hint').innerHTML =
    '<kbd>←</kbd> <kbd>→</kbd> 이동 · <kbd>SPACE</kbd> 발사';

  document.getElementById('touch-controls').innerHTML = `
    <button class="touch-btn" data-key="ArrowLeft">◀</button>
    <button class="touch-btn touch-btn-wide" data-key=" ">발사</button>
    <button class="touch-btn" data-key="ArrowRight">▶</button>
  `;
  setupTouchControls();

  let stage = 1, lives = 3, rawScore = 0;
  let startTime = Date.now();
  const paddleW = 80, paddleH = 12;
  let paddleX = (480 - paddleW) / 2;
  let ballR = 6;
  let ballX = 240, ballY = 500, ballDX = 3, ballDY = -3;
  let launched = false;
  let bricks = [];
  const brickRows = 5, brickCols = 8, brickW = 52, brickH = 18, brickPad = 4, brickOffTop = 50, brickOffLeft = 14;
  const brickColors = ['#ff006e','#ff6a00','#ffe600','#39ff14','#00fff5','#b026ff'];

  function createBricks() {
    bricks = [];
    for (let r = 0; r < brickRows; r++) {
      for (let c = 0; c < brickCols; c++) {
        // Higher stages: more hits needed
        const hits = stage > 10 ? (r < 2 ? 2 : 1) : 1;
        bricks.push({
          x: brickOffLeft + c * (brickW + brickPad),
          y: brickOffTop + r * (brickH + brickPad),
          w: brickW, h: brickH,
          color: brickColors[r % brickColors.length],
          alive: true,
          hits
        });
      }
    }
  }
  createBricks();

  const keys = {};
  function onKey(e) { if (gameActive) keys[e.key] = e.type === 'keydown'; if (e.key === ' ') e.preventDefault(); }
  document.addEventListener('keydown', onKey);
  document.addEventListener('keyup', onKey);

  let ballSpeed = 3 + (selectedDiff === 'hard' ? 1.5 : selectedDiff === 'easy' ? -0.5 : 0);

  function resetBall() {
    launched = false;
    ballX = paddleX + paddleW / 2;
    ballY = 560 - 30 - paddleH - ballR;
    const angle = -Math.PI / 4 + Math.random() * Math.PI / 2;
    const spd = ballSpeed + stage * 0.1;
    ballDX = Math.sin(angle) * spd;
    ballDY = -Math.cos(angle) * spd;
  }

  function update() {
    // Paddle
    const pSpeed = 7;
    if (keys['ArrowLeft']) paddleX = Math.max(0, paddleX - pSpeed);
    if (keys['ArrowRight']) paddleX = Math.min(480 - paddleW, paddleX + pSpeed);

    if (!launched) {
      ballX = paddleX + paddleW / 2;
      ballY = 560 - 30 - paddleH - ballR;
      if (keys[' ']) launched = true;
      return;
    }

    ballX += ballDX;
    ballY += ballDY;

    // Walls
    if (ballX - ballR < 0 || ballX + ballR > 480) ballDX = -ballDX;
    if (ballY - ballR < 0) ballDY = -ballDY;

    // Paddle collision
    if (ballY + ballR >= 560 - 30 - paddleH && ballY + ballR <= 560 - 28 &&
        ballX >= paddleX && ballX <= paddleX + paddleW && ballDY > 0) {
      const hitPos = (ballX - paddleX) / paddleW - 0.5;
      const spd = Math.sqrt(ballDX * ballDX + ballDY * ballDY);
      const angle = hitPos * Math.PI * 0.7;
      ballDX = Math.sin(angle) * spd;
      ballDY = -Math.abs(Math.cos(angle) * spd);
    }

    // Floor
    if (ballY > 580) {
      lives--;
      document.getElementById('b-lives').textContent = lives;
      if (lives <= 0) {
        finishBrick();
        return;
      }
      resetBall();
    }

    // Brick collision
    for (const b of bricks) {
      if (!b.alive) continue;
      if (ballX + ballR > b.x && ballX - ballR < b.x + b.w &&
          ballY + ballR > b.y && ballY - ballR < b.y + b.h) {
        b.hits--;
        if (b.hits <= 0) { b.alive = false; rawScore += 10; }
        else { b.color = '#888'; }
        ballDY = -ballDY;
        document.getElementById('b-score').textContent = rawScore;
        break;
      }
    }

    // Stage clear
    if (bricks.every(b => !b.alive)) {
      if (stage >= maxStages) {
        finishBrick();
        return;
      }
      stage++;
      document.getElementById('b-stage').textContent = stage;
      createBricks();
      resetBall();
    }
  }

  function draw() {
    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(0, 0, 480, 560);

    // Bricks
    for (const b of bricks) {
      if (!b.alive) continue;
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.roundRect(b.x, b.y, b.w, b.h, 3);
      ctx.fill();
      if (b.hits > 1) {
        ctx.fillStyle = '#fff';
        ctx.font = '10px "Press Start 2P"';
        ctx.textAlign = 'center';
        ctx.fillText(b.hits, b.x + b.w/2, b.y + b.h/2 + 4);
      }
    }

    // Paddle
    ctx.fillStyle = var_neon_cyan;
    ctx.shadowColor = 'rgba(0,255,245,0.5)';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.roundRect(paddleX, 560 - 30 - paddleH, paddleW, paddleH, 6);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Ball
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(255,255,255,0.8)';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(ballX, ballY, ballR, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  const var_neon_cyan = '#00fff5';

  function finishBrick() {
    document.removeEventListener('keydown', onKey);
    document.removeEventListener('keyup', onKey);
    cancelAnimationFrame(brickRAF);

    const elapsed = (Date.now() - startTime) / 1000;
    const stageScore = Math.round((stage / maxStages) * 60);
    const lifeScore = Math.round((lives / 3) * 20);
    const timeBonus = Math.round(Math.max(0, 10 - elapsed / 30));
    const rawBonus = Math.min(10, Math.round(rawScore / (maxStages * 40) * 10));
    const total = Math.min(100, stageScore + lifeScore + timeBonus + rawBonus);

    endCurrentGame(total, {
      '스테이지': `${stage} / ${maxStages}`,
      '남은 목숨': lives,
      '원점수': rawScore,
      '소요 시간': `${Math.floor(elapsed)}초`,
    });
  }

  let brickRAF;
  function loop() {
    if (!gameActive) return;
    update();
    draw();
    brickRAF = requestAnimationFrame(loop);
  }
  resetBall();
  loop();
}


// ==================== GAME 2: BUBBLE BOBBLE ====================
function startBubbleBobble() {
  const diff = DIFF[selectedDiff];
  const maxRounds = diff.bubbleRounds;
  canvas.width = 480; canvas.height = 560;

  const gh = document.getElementById('game-header');
  gh.innerHTML = `
    <div class="game-title bubble pixel-font">2종목: 보글보글</div>
    <div class="game-stats">
      <span>ROUND <em id="bb-round">1</em>/${maxRounds}</span>
      <span>LIVES <em id="bb-lives">3</em></span>
      <span>SCORE <em id="bb-score">0</em></span>
    </div>
  `;
  document.getElementById('controls-hint').innerHTML =
    '<kbd>←</kbd> <kbd>→</kbd> 이동 · <kbd>↑</kbd> 점프 · <kbd>SPACE</kbd> 버블';

  document.getElementById('touch-controls').innerHTML = `
    <button class="touch-btn" data-key="ArrowLeft">◀</button>
    <button class="touch-btn" data-key="ArrowUp">▲</button>
    <button class="touch-btn" data-key=" ">🫧</button>
    <button class="touch-btn" data-key="ArrowRight">▶</button>
  `;
  setupTouchControls();

  let round = 1, lives = 3, score = 0, kills = 0, quickClears = 0, multiKills = 0;
  let startTime = Date.now();

  // Player
  const P = { x: 60, y: 480, w: 24, h: 28, vx: 0, vy: 0, dir: 1, onGround: false };
  // Platforms
  const platforms = [];
  const enemies = [];
  const bubbles = [];
  const capturedBubbles = [];
  const particles = [];

  function generateLevel() {
    platforms.length = 0;
    enemies.length = 0;
    bubbles.length = 0;
    capturedBubbles.length = 0;

    // Floor
    platforms.push({ x: 0, y: 530, w: 480, h: 30 });
    // Walls
    platforms.push({ x: 0, y: 0, w: 16, h: 560 });
    platforms.push({ x: 464, y: 0, w: 16, h: 560 });

    // Random platforms
    const numPlats = 4 + Math.min(round, 8);
    for (let i = 0; i < numPlats; i++) {
      const pw = 50 + Math.random() * 80;
      const px = 20 + Math.random() * (440 - pw);
      const py = 100 + i * (400 / numPlats);
      platforms.push({ x: px, y: py, w: pw, h: 12 });
    }

    // Enemies
    const numEnemies = Math.min(2 + Math.floor(round * 0.7), 8);
    for (let i = 0; i < numEnemies; i++) {
      const ep = platforms[2 + Math.floor(Math.random() * (platforms.length - 2))];
      if (!ep) continue;
      enemies.push({
        x: ep.x + Math.random() * (ep.w - 20),
        y: ep.y - 22,
        w: 20, h: 20,
        vx: (1 + Math.random() * 0.5 + round * 0.1) * (Math.random() > 0.5 ? 1 : -1),
        vy: 0,
        alive: true,
        captured: false,
        color: ['#ff006e','#ff6a00','#b026ff','#00fff5'][i % 4]
      });
    }

    P.x = 60; P.y = 480; P.vx = 0; P.vy = 0;
  }

  generateLevel();

  const keys = {};
  function onKey(e) { if (gameActive) keys[e.key] = e.type === 'keydown'; if ([' ','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault(); }
  document.addEventListener('keydown', onKey);
  document.addEventListener('keyup', onKey);

  let bubbleCooldown = 0;

  function update() {
    // Player movement
    if (keys['ArrowLeft']) { P.vx = -4; P.dir = -1; }
    else if (keys['ArrowRight']) { P.vx = 4; P.dir = 1; }
    else P.vx *= 0.7;

    if (keys['ArrowUp'] && P.onGround) { P.vy = -9; P.onGround = false; }

    P.vy += 0.5; // gravity
    P.x += P.vx;
    P.y += P.vy;

    // Platform collision
    P.onGround = false;
    for (const pl of platforms) {
      if (P.x + P.w > pl.x && P.x < pl.x + pl.w) {
        if (P.vy >= 0 && P.y + P.h >= pl.y && P.y + P.h <= pl.y + pl.h + 10) {
          P.y = pl.y - P.h;
          P.vy = 0;
          P.onGround = true;
        }
      }
      // Side walls
      if (pl.w === 16) {
        if (P.x < pl.x + pl.w && pl.x < 100) P.x = pl.x + pl.w;
        if (P.x + P.w > pl.x && pl.x > 100) P.x = pl.x - P.w;
      }
    }

    // Wrap top/bottom
    if (P.y > 560) P.y = -P.h;
    if (P.y < -P.h) P.y = 560;

    // Shoot bubble
    if (bubbleCooldown > 0) bubbleCooldown--;
    if (keys[' '] && bubbleCooldown <= 0) {
      bubbles.push({ x: P.x + P.w/2, y: P.y + 6, vx: P.dir * 5, vy: -0.5, life: 90, r: 10 });
      bubbleCooldown = 15;
    }

    // Update bubbles
    for (let i = bubbles.length - 1; i >= 0; i--) {
      const b = bubbles[i];
      b.x += b.vx;
      b.y += b.vy;
      b.vx *= 0.97;
      b.vy -= 0.02;
      b.life--;
      if (b.life <= 0 || b.x < 0 || b.x > 480 || b.y < -20) {
        bubbles.splice(i, 1);
        continue;
      }

      // Bubble captures enemy
      for (const e of enemies) {
        if (!e.alive || e.captured) continue;
        if (Math.abs(b.x - e.x - e.w/2) < 18 && Math.abs(b.y - e.y - e.h/2) < 18) {
          e.captured = true;
          e.captureTime = 180;
          capturedBubbles.push(e);
          bubbles.splice(i, 1);
          break;
        }
      }
    }

    // Update captured
    for (const e of capturedBubbles) {
      if (!e.captured) continue;
      e.y -= 0.5;
      e.captureTime--;
      if (e.captureTime <= 0) {
        e.captured = false;
        e.vy = 0;
        const idx = capturedBubbles.indexOf(e);
        if (idx > -1) capturedBubbles.splice(idx, 1);
      }
    }

    // Player pops captured enemies
    let killBatch = 0;
    for (let i = capturedBubbles.length - 1; i >= 0; i--) {
      const e = capturedBubbles[i];
      if (Math.abs(P.x + P.w/2 - e.x - e.w/2) < 24 && Math.abs(P.y + P.h/2 - e.y - e.h/2) < 24) {
        e.alive = false;
        e.captured = false;
        capturedBubbles.splice(i, 1);
        kills++;
        killBatch++;
        score += 100;
        // Particles
        for (let p = 0; p < 6; p++) {
          particles.push({ x: e.x + e.w/2, y: e.y + e.h/2, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 30, color: e.color });
        }
      }
    }
    if (killBatch > 1) { multiKills++; score += killBatch * 50; }

    // Enemy AI
    for (const e of enemies) {
      if (!e.alive || e.captured) continue;
      e.x += e.vx;
      e.vy += 0.4;
      e.y += e.vy;

      for (const pl of platforms) {
        if (e.x + e.w > pl.x && e.x < pl.x + pl.w && e.vy >= 0 && e.y + e.h >= pl.y && e.y + e.h <= pl.y + pl.h + 8) {
          e.y = pl.y - e.h;
          e.vy = 0;
        }
        if (pl.w === 16) {
          if (e.x < pl.x + pl.w && pl.x < 100) { e.x = pl.x + pl.w; e.vx = Math.abs(e.vx); }
          if (e.x + e.w > pl.x && pl.x > 100) { e.x = pl.x - e.w; e.vx = -Math.abs(e.vx); }
        }
      }
      if (e.y > 560) e.y = -e.h;

      // Collision with player
      if (Math.abs(P.x + P.w/2 - e.x - e.w/2) < 18 && Math.abs(P.y + P.h/2 - e.y - e.h/2) < 18) {
        lives--;
        document.getElementById('bb-lives').textContent = lives;
        if (lives <= 0) { finishBubble(); return; }
        P.x = 60; P.y = 480; P.vx = 0; P.vy = 0;
      }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    document.getElementById('bb-score').textContent = score;

    // Round clear
    if (enemies.every(e => !e.alive)) {
      const elapsed = (Date.now() - startTime) / 1000;
      if (elapsed < round * 12) quickClears++;
      if (round >= maxRounds) { finishBubble(); return; }
      round++;
      document.getElementById('bb-round').textContent = round;
      generateLevel();
    }
  }

  function draw() {
    ctx.fillStyle = '#060618';
    ctx.fillRect(0, 0, 480, 560);

    // Platforms
    for (const pl of platforms) {
      if (pl.w > 100 && pl.h === 30) {
        ctx.fillStyle = '#1a1a3a';
      } else if (pl.w === 16) {
        ctx.fillStyle = '#1a1a3a';
      } else {
        ctx.fillStyle = '#2a2a4a';
      }
      ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
    }

    // Bubbles
    for (const b of bubbles) {
      ctx.strokeStyle = `rgba(57,255,20,${b.life/90})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Enemies
    for (const e of enemies) {
      if (!e.alive) continue;
      if (e.captured) {
        ctx.strokeStyle = '#39ff14';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(e.x + e.w/2, e.y + e.h/2, 14, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 0.6;
      }
      ctx.fillStyle = e.color;
      ctx.fillRect(e.x, e.y, e.w, e.h);
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.fillRect(e.x + 4, e.y + 5, 5, 5);
      ctx.fillRect(e.x + 12, e.y + 5, 5, 5);
      ctx.fillStyle = '#000';
      ctx.fillRect(e.x + 6, e.y + 7, 2, 2);
      ctx.fillRect(e.x + 14, e.y + 7, 2, 2);
      ctx.globalAlpha = 1;
    }

    // Player
    ctx.fillStyle = '#39ff14';
    ctx.shadowColor = 'rgba(57,255,20,0.5)';
    ctx.shadowBlur = 10;
    ctx.fillRect(P.x, P.y, P.w, P.h);
    // Face
    ctx.fillStyle = '#fff';
    ctx.fillRect(P.x + 5, P.y + 6, 5, 5);
    ctx.fillRect(P.x + 14, P.y + 6, 5, 5);
    ctx.fillRect(P.x + 6, P.y + 18, 12, 3);
    ctx.shadowBlur = 0;

    // Particles
    for (const p of particles) {
      ctx.globalAlpha = p.life / 30;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;
  }

  function finishBubble() {
    gameActive = false;
    document.removeEventListener('keydown', onKey);
    document.removeEventListener('keyup', onKey);
    cancelAnimationFrame(bbRAF);

    const roundScore = Math.round((round / maxRounds) * 50);
    const lifeScore = Math.round((lives / 3) * 20);
    const clearBonus = Math.round(Math.min(20, (quickClears / maxRounds) * 20));
    const multiBonus = Math.min(10, multiKills * 3);
    const total = Math.min(100, roundScore + lifeScore + clearBonus + multiBonus);

    endCurrentGame(total, {
      '라운드': `${round} / ${maxRounds}`,
      '남은 목숨': lives,
      '처치 수': kills,
      '멀티 킬': multiKills,
    });
  }

  let bbRAF;
  function loop() {
    if (!gameActive) return;
    update();
    draw();
    bbRAF = requestAnimationFrame(loop);
  }
  loop();
}


// ==================== GAME 3: TETRIS ====================
function startTetris() {
  const diff = DIFF[selectedDiff];
  const maxTime = diff.tetrisTime;
  const startLevel = diff.tetrisLevel;
  canvas.width = 480; canvas.height = 560;

  const gh = document.getElementById('game-header');
  gh.innerHTML = `
    <div class="game-title tetris pixel-font">3종목: 테트리스</div>
    <div class="game-stats">
      <span>TIME <em id="t-time">${Math.floor(maxTime/60)}:00</em></span>
      <span>LEVEL <em id="t-level">${startLevel}</em></span>
      <span>LINES <em id="t-lines">0</em></span>
      <span>TETRIS <em id="t-tetris">0</em></span>
    </div>
  `;
  document.getElementById('controls-hint').innerHTML =
    '<kbd>←</kbd> <kbd>→</kbd> 이동 · <kbd>↑</kbd> 회전 · <kbd>↓</kbd> 소프트드롭 · <kbd>SPACE</kbd> 하드드롭';

  document.getElementById('touch-controls').innerHTML = `
    <button class="touch-btn" data-key="ArrowLeft">◀</button>
    <button class="touch-btn" data-key="ArrowUp">↻</button>
    <button class="touch-btn" data-key="ArrowDown">▼</button>
    <button class="touch-btn" data-key="ArrowRight">▶</button>
    <button class="touch-btn touch-btn-wide" data-key=" ">DROP</button>
  `;
  setupTouchControls();

  const COLS = 10, ROWS = 22;
  const CELL = 24;
  const OFFSET_X = (480 - COLS * CELL) / 2;
  const OFFSET_Y = 20;
  const board = Array.from({length: ROWS}, () => Array(COLS).fill(0));

  const PIECES = [
    { shape: [[1,1,1,1]], color: '#00fff5' },       // I
    { shape: [[1,1],[1,1]], color: '#ffe600' },      // O
    { shape: [[0,1,0],[1,1,1]], color: '#b026ff' },  // T
    { shape: [[1,0,0],[1,1,1]], color: '#ff6a00' },  // L
    { shape: [[0,0,1],[1,1,1]], color: '#0066ff' },  // J
    { shape: [[0,1,1],[1,1,0]], color: '#39ff14' },  // S
    { shape: [[1,1,0],[0,1,1]], color: '#ff006e' },  // Z
  ];

  let level = startLevel;
  let lines = 0, tetrisCount = 0;
  let startTime = Date.now();
  let gameOver = false;
  let current, curX, curY, curColor;
  let nextPiece;

  function getSpeed() { return Math.max(50, 500 - level * 40); }

  function randomPiece() {
    const p = PIECES[Math.floor(Math.random() * PIECES.length)];
    return { shape: p.shape.map(r => [...r]), color: p.color };
  }

  function spawn() {
    if (nextPiece) {
      current = nextPiece.shape;
      curColor = nextPiece.color;
    } else {
      const p = randomPiece();
      current = p.shape; curColor = p.color;
    }
    const np = randomPiece();
    nextPiece = { shape: np.shape, color: np.color };
    curX = Math.floor((COLS - current[0].length) / 2);
    curY = 0;
    if (collides(current, curX, curY)) { gameOver = true; finishTetris(); }
  }

  function collides(piece, px, py) {
    for (let r = 0; r < piece.length; r++) {
      for (let c = 0; c < piece[r].length; c++) {
        if (!piece[r][c]) continue;
        const nx = px + c, ny = py + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
        if (ny >= 0 && board[ny][nx]) return true;
      }
    }
    return false;
  }

  function lock() {
    for (let r = 0; r < current.length; r++) {
      for (let c = 0; c < current[r].length; c++) {
        if (!current[r][c]) continue;
        const ny = curY + r;
        if (ny < 0) { gameOver = true; finishTetris(); return; }
        board[ny][curX + c] = curColor;
      }
    }
    clearLines();
    spawn();
  }

  function clearLines() {
    let cleared = 0;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r].every(c => c)) {
        board.splice(r, 1);
        board.unshift(Array(COLS).fill(0));
        cleared++;
        r++;
      }
    }
    if (cleared > 0) {
      lines += cleared;
      if (cleared === 4) tetrisCount++;
      level = startLevel + Math.floor(lines / 10);
      document.getElementById('t-lines').textContent = lines;
      document.getElementById('t-level').textContent = level;
      document.getElementById('t-tetris').textContent = tetrisCount;
    }
  }

  function rotate() {
    const rows = current.length, cols = current[0].length;
    const rotated = [];
    for (let c = 0; c < cols; c++) {
      const newRow = [];
      for (let r = rows - 1; r >= 0; r--) {
        newRow.push(current[r][c]);
      }
      rotated.push(newRow);
    }
    // Wall kick
    const kicks = [0, -1, 1, -2, 2];
    for (const kick of kicks) {
      if (!collides(rotated, curX + kick, curY)) {
        current = rotated;
        curX += kick;
        return;
      }
    }
  }

  function hardDrop() {
    while (!collides(current, curX, curY + 1)) curY++;
    lock();
  }

  function getGhostY() {
    let gy = curY;
    while (!collides(current, curX, gy + 1)) gy++;
    return gy;
  }

  const keys = {};
  let dasTimer = {};
  function onKey(e) {
    if (!gameActive || gameOver) return;
    if (['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' '].includes(e.key)) e.preventDefault();
    if (e.type === 'keydown') {
      if (!keys[e.key]) {
        keys[e.key] = true;
        if (e.key === 'ArrowLeft') { if (!collides(current, curX-1, curY)) curX--; }
        else if (e.key === 'ArrowRight') { if (!collides(current, curX+1, curY)) curX++; }
        else if (e.key === 'ArrowDown') { if (!collides(current, curX, curY+1)) curY++; }
        else if (e.key === 'ArrowUp') rotate();
        else if (e.key === ' ') hardDrop();
      }
    } else {
      keys[e.key] = false;
    }
  }
  document.addEventListener('keydown', onKey);
  document.addEventListener('keyup', onKey);

  // DAS (Delayed Auto Shift)
  let dasLeft = 0, dasRight = 0, dasDown = 0;

  function updateDAS() {
    if (keys['ArrowLeft']) { dasLeft++; if (dasLeft > 10 && dasLeft % 3 === 0) { if (!collides(current, curX-1, curY)) curX--; } }
    else dasLeft = 0;
    if (keys['ArrowRight']) { dasRight++; if (dasRight > 10 && dasRight % 3 === 0) { if (!collides(current, curX+1, curY)) curX++; } }
    else dasRight = 0;
    if (keys['ArrowDown']) { dasDown++; if (dasDown > 3 && dasDown % 2 === 0) { if (!collides(current, curX, curY+1)) curY++; } }
    else dasDown = 0;
  }

  spawn();
  let dropTimer = 0;

  function update() {
    const elapsed = (Date.now() - startTime) / 1000;
    const remaining = Math.max(0, maxTime - elapsed);
    const mins = Math.floor(remaining / 60);
    const secs = Math.floor(remaining % 60);
    document.getElementById('t-time').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

    if (remaining <= 0) { finishTetris(); return; }

    updateDAS();

    dropTimer++;
    if (dropTimer >= getSpeed() / 16) {
      dropTimer = 0;
      if (!collides(current, curX, curY + 1)) curY++;
      else lock();
    }
  }

  function draw() {
    ctx.fillStyle = '#08081a';
    ctx.fillRect(0, 0, 480, 560);

    // Board border
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.strokeRect(OFFSET_X - 2, OFFSET_Y - 2, COLS * CELL + 4, ROWS * CELL + 4);

    // Board cells
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const x = OFFSET_X + c * CELL, y = OFFSET_Y + r * CELL;
        if (board[r][c]) {
          ctx.fillStyle = board[r][c];
          ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
          ctx.fillStyle = 'rgba(255,255,255,0.15)';
          ctx.fillRect(x + 1, y + 1, CELL - 2, 3);
        } else {
          ctx.fillStyle = '#0d0d20';
          ctx.fillRect(x, y, CELL, CELL);
          ctx.strokeStyle = '#181830';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(x, y, CELL, CELL);
        }
      }
    }

    // Ghost piece
    if (current) {
      const gy = getGhostY();
      ctx.globalAlpha = 0.2;
      for (let r = 0; r < current.length; r++) {
        for (let c = 0; c < current[r].length; c++) {
          if (!current[r][c]) continue;
          const x = OFFSET_X + (curX + c) * CELL;
          const y = OFFSET_Y + (gy + r) * CELL;
          ctx.fillStyle = curColor;
          ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
        }
      }
      ctx.globalAlpha = 1;

      // Current piece
      for (let r = 0; r < current.length; r++) {
        for (let c = 0; c < current[r].length; c++) {
          if (!current[r][c]) continue;
          const x = OFFSET_X + (curX + c) * CELL;
          const y = OFFSET_Y + (curY + r) * CELL;
          ctx.fillStyle = curColor;
          ctx.shadowColor = curColor;
          ctx.shadowBlur = 6;
          ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
          ctx.fillStyle = 'rgba(255,255,255,0.2)';
          ctx.fillRect(x + 1, y + 1, CELL - 2, 3);
          ctx.shadowBlur = 0;
        }
      }
    }

    // Next piece preview
    if (nextPiece) {
      ctx.fillStyle = '#fff';
      ctx.font = '9px "Press Start 2P"';
      ctx.fillText('NEXT', OFFSET_X + COLS * CELL + 16, OFFSET_Y + 20);
      for (let r = 0; r < nextPiece.shape.length; r++) {
        for (let c = 0; c < nextPiece.shape[r].length; c++) {
          if (!nextPiece.shape[r][c]) continue;
          const x = OFFSET_X + COLS * CELL + 20 + c * 16;
          const y = OFFSET_Y + 30 + r * 16;
          ctx.fillStyle = nextPiece.color;
          ctx.fillRect(x, y, 14, 14);
        }
      }
    }
  }

  function finishTetris() {
    gameActive = false;
    document.removeEventListener('keydown', onKey);
    document.removeEventListener('keyup', onKey);
    cancelAnimationFrame(tetRAF);

    const elapsed = Math.min(maxTime, (Date.now() - startTime) / 1000);
    const survivalScore = Math.round((elapsed / maxTime) * 35);
    const lineScore = Math.round(Math.min(25, lines / (maxTime / 30) * 25));
    const levelScore = Math.round(Math.min(20, ((level - startLevel) / 5) * 20));
    const tetrisScore = Math.round(Math.min(20, tetrisCount * 5));
    const total = Math.min(100, survivalScore + lineScore + levelScore + tetrisScore);

    endCurrentGame(total, {
      '생존 시간': `${Math.floor(elapsed)}초 / ${maxTime}초`,
      '삭제 줄': lines,
      '도달 레벨': level,
      '테트리스': tetrisCount,
    });
  }

  let tetRAF;
  function loop() {
    if (!gameActive || gameOver) return;
    update();
    draw();
    tetRAF = requestAnimationFrame(loop);
  }
  loop();
}


// ==================== TOUCH CONTROLS ====================
function setupTouchControls() {
  document.querySelectorAll('.touch-btn').forEach(btn => {
    const key = btn.dataset.key;
    function fire() {
      document.dispatchEvent(new KeyboardEvent('keydown', { key }));
      setTimeout(() => document.dispatchEvent(new KeyboardEvent('keyup', { key })), 80);
    }
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); fire(); });
    btn.addEventListener('mousedown', (e) => { e.preventDefault(); fire(); });
  });
}
</script>
</body>
