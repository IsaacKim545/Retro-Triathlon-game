<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>레트로 철인 3종</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&display=swap');
:root{
  --bg:#0a0a12;--card:#1a1a2e;--cyan:#00fff5;--pink:#ff006e;--yel:#ffe600;
  --grn:#39ff14;--org:#ff6a00;--pur:#b026ff;--txt:#e0e0e0;--dim:#666680;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--txt);font-family:'Noto Sans KR',sans-serif;
  overflow-x:hidden;min-height:100vh;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
body::after{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,245,0.03) 2px,rgba(0,255,245,0.03) 4px);
  pointer-events:none;z-index:9999;}
.pf{font-family:'Press Start 2P',cursive;}

/* === SCREENS === */
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:16px;}
.screen.active{display:flex;}

/* === MENU === */
#menu h1{font-family:'Press Start 2P',cursive;font-size:clamp(15px,3.8vw,30px);color:var(--cyan);
  text-shadow:0 0 20px rgba(0,255,245,0.5);margin-bottom:8px;text-align:center;}
.sub{font-size:12px;color:var(--dim);letter-spacing:4px;text-transform:uppercase;margin-bottom:20px;}

/* Game select cards */
.game-cards{display:flex;gap:14px;margin:16px 0;flex-wrap:wrap;justify-content:center;}
.gcard{width:100px;height:100px;border-radius:16px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:6px;font-size:32px;position:relative;}
.gcard span{font-family:'Press Start 2P',cursive;font-size:6px;color:#fff;}
.gcard .gcard-sub{font-size:9px;color:var(--dim);margin-top:2px;font-family:'Noto Sans KR',sans-serif;}
.gc-b{background:linear-gradient(135deg,#ff006e22,#ff006e08);border:2px solid var(--pink);box-shadow:0 0 12px rgba(255,0,110,0.15);}
.gc-bb{background:linear-gradient(135deg,#39ff1422,#39ff1408);border:2px solid var(--grn);box-shadow:0 0 12px rgba(57,255,20,0.15);}
.gc-t{background:linear-gradient(135deg,#b026ff22,#b026ff08);border:2px solid var(--pur);box-shadow:0 0 12px rgba(176,38,255,0.15);}

.diffs{display:flex;gap:10px;margin:10px 0;flex-wrap:wrap;justify-content:center;}
.dbtn{font-family:'Press Start 2P',cursive;font-size:9px;padding:10px 18px;border:2px solid var(--dim);
  background:transparent;color:var(--dim);border-radius:8px;cursor:pointer;transition:all .3s;}
.dbtn:hover,.dbtn.on{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 12px rgba(0,255,245,0.2);}
.dinfo{background:var(--card);border:1px solid #333;border-radius:10px;padding:12px 18px;margin:8px 0;
  font-size:11px;line-height:1.8;max-width:400px;text-align:left;color:var(--dim);}
.dinfo b{color:var(--yel);font-family:'Press Start 2P',cursive;font-size:7px;}
.gobtn{font-family:'Press Start 2P',cursive;font-size:12px;padding:14px 40px;border:2px solid var(--yel);
  background:transparent;color:var(--yel);border-radius:8px;cursor:pointer;margin-top:16px;transition:all .3s;}
.gobtn:hover{background:var(--yel);color:var(--bg);}

/* === GAME === */
#game{padding:4px 4px 0;justify-content:flex-start;}
.ghdr{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:480px;padding:4px 2px;flex-wrap:wrap;gap:4px;}
.gtitle{font-family:'Press Start 2P',cursive;font-size:clamp(8px,2vw,13px);}
.gtitle.c1{color:var(--pink);}.gtitle.c2{color:var(--grn);}.gtitle.c3{color:var(--pur);}
.gstats{display:flex;gap:8px;font-family:'Press Start 2P',cursive;font-size:clamp(6px,1.5vw,8px);color:var(--dim);}
.gstats em{font-style:normal;color:var(--cyan);}
#gameCanvas{display:block;border:2px solid #333;border-radius:4px;background:#000;}

/* Progress */
.pbar{display:flex;gap:6px;align-items:center;margin-bottom:4px;}
.pdot{width:10px;height:10px;border-radius:50%;border:2px solid #444;transition:all .3s;}
.pdot.dn{background:var(--grn);border-color:var(--grn);box-shadow:0 0 6px rgba(57,255,20,0.5);}
.pdot.cur{border-color:var(--cyan);box-shadow:0 0 6px rgba(0,255,245,0.5);animation:pls 1s infinite;}
.pln{width:24px;height:2px;background:#333;}.pln.dn{background:var(--grn);}
@keyframes pls{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}

/* === TOUCH CONTROLS === */
.tctrl{display:none;margin-top:6px;justify-content:center;gap:6px;flex-wrap:wrap;width:100%;max-width:480px;}
.tbtn{min-width:56px;height:56px;border-radius:12px;border:2px solid #444;background:var(--card);
  color:var(--cyan);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  padding:0 14px;transition:background .1s,border-color .1s;}
.tbtn.pressed{background:rgba(0,255,245,0.2);border-color:var(--cyan);}
.tbtn-w{min-width:110px;font-size:14px;font-family:'Press Start 2P',cursive;}
@media(pointer:coarse){.tctrl{display:flex;}}
@media(max-width:520px){.tctrl{display:flex;}}

/* Brick paddle slider area */
.paddle-zone{display:none;width:100%;max-width:480px;height:72px;margin-top:6px;
  background:var(--card);border:2px solid #333;border-radius:14px;position:relative;overflow:hidden;
  touch-action:none;}
.paddle-zone .pz-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Press Start 2P',cursive;font-size:7px;color:rgba(0,255,245,0.2);pointer-events:none;}
.paddle-zone .pz-indicator{position:absolute;top:50%;height:40px;width:60px;
  transform:translate(-50%,-50%);background:rgba(0,255,245,0.15);border:2px solid var(--cyan);
  border-radius:10px;pointer-events:none;transition:left 0.05s linear;}
.paddle-zone .pz-launch{position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:56px;height:56px;border-radius:12px;border:2px solid var(--yel);background:rgba(255,230,0,0.1);
  color:var(--yel);font-size:14px;font-family:'Press Start 2P',cursive;display:flex;align-items:center;
  justify-content:center;cursor:pointer;z-index:2;}
.paddle-zone .pz-launch.pressed{background:rgba(255,230,0,0.3);}
@media(pointer:coarse){.paddle-zone{display:block;}}
@media(max-width:520px){.paddle-zone{display:block;}}

/* === OVERLAYS === */
.tbox{background:var(--card);border:1px solid #333;border-radius:14px;padding:24px 28px;margin:16px 0;min-width:240px;text-align:center;}
.tbox h3{font-family:'Press Start 2P',cursive;font-size:10px;margin-bottom:12px;color:var(--yel);}
.tsc{font-family:'Press Start 2P',cursive;font-size:26px;color:var(--cyan);text-shadow:0 0 16px rgba(0,255,245,0.4);}
.tsc small{font-size:10px;color:var(--dim);}
.tdet{margin-top:12px;font-size:11px;line-height:2;color:var(--dim);text-align:left;}
.tdet span{color:var(--txt);float:right;}
.nbtn{font-family:'Press Start 2P',cursive;font-size:10px;padding:12px 32px;border:2px solid var(--grn);
  background:transparent;color:var(--grn);border-radius:8px;cursor:pointer;margin-top:14px;transition:all .3s;}
.nbtn:hover{background:var(--grn);color:var(--bg);}

/* Final */
.fcards{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;}
.fcard{background:var(--card);border-radius:14px;padding:16px;min-width:120px;text-align:center;border:1px solid #333;}
.fcard .fi{font-size:22px;margin-bottom:4px;}.fcard .fn{font-family:'Press Start 2P',cursive;font-size:7px;color:var(--dim);margin-bottom:8px;}
.fcard .fs{font-family:'Press Start 2P',cursive;font-size:22px;margin-bottom:2px;}.fcard .fm{font-size:9px;color:var(--dim);}
.fcard.c1 .fs{color:var(--pink);}.fcard.c2 .fs{color:var(--grn);}.fcard.c3 .fs{color:var(--pur);}
.ftot{background:linear-gradient(135deg,var(--card),#1e1e3a);border:2px solid var(--cyan);border-radius:14px;
  padding:20px 36px;text-align:center;box-shadow:0 0 24px rgba(0,255,245,0.1);margin-bottom:14px;}
.ftl{font-family:'Press Start 2P',cursive;font-size:8px;color:var(--dim);margin-bottom:6px;}
.fts{font-family:'Press Start 2P',cursive;font-size:clamp(28px,6vw,44px);color:var(--cyan);text-shadow:0 0 20px rgba(0,255,245,0.5);}
.fts small{font-size:12px;color:var(--dim);}
.fgr{font-family:'Press Start 2P',cursive;font-size:10px;margin-top:8px;padding:4px 12px;border-radius:14px;display:inline-block;}
.gs{background:var(--yel);color:#000;}.ga{background:var(--cyan);color:#000;}
.gb{background:var(--grn);color:#000;}.gc{background:var(--org);color:#000;}.gd{background:var(--pink);color:#000;}
.rbtn{font-family:'Press Start 2P',cursive;font-size:10px;padding:12px 32px;border:2px solid var(--yel);
  background:transparent;color:var(--yel);border-radius:8px;cursor:pointer;margin-top:10px;transition:all .3s;}
.rbtn:hover{background:var(--yel);color:var(--bg);}

#cdown{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;
  z-index:1000;font-family:'Press Start 2P',cursive;font-size:60px;color:var(--cyan);text-shadow:0 0 40px rgba(0,255,245,0.6);}
#cdown.hide{display:none;}
.stage-clear{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:500;animation:fi .3s;}
.stage-clear h2{font-family:'Press Start 2P',cursive;font-size:clamp(13px,3vw,22px);color:var(--yel);
  text-shadow:0 0 20px rgba(255,230,0,0.5);margin-bottom:10px;}
.stage-clear p{font-size:13px;color:var(--dim);margin-bottom:14px;}
@keyframes fi{from{opacity:0;}to{opacity:1;}}

/* Back button */
.back-btn{position:absolute;top:12px;left:12px;font-family:'Press Start 2P',cursive;font-size:8px;
  padding:8px 12px;border:1px solid #444;background:transparent;color:var(--dim);border-radius:6px;
  cursor:pointer;z-index:10;transition:all .2s;}
.back-btn:hover{border-color:var(--cyan);color:var(--cyan);}
</style>
</head>
<body>

<!-- MENU -->
<div class="screen active" id="menu">
  <h1>레트로 철인 3종</h1>
  <div class="sub">RETRO TRIATHLON</div>

  <div class="game-cards">
    <div class="gcard gc-b">🧱<span>BRICK</span><div class="gcard-sub">벽돌 깨기</div></div>
    <div class="gcard gc-bb">🫧<span>BUBBLE</span><div class="gcard-sub">보글보글</div></div>
    <div class="gcard gc-t">🟪<span>TETRIS</span><div class="gcard-sub">테트리스</div></div>
  </div>

  <div class="diffs">
    <button class="dbtn" data-d="easy">입문</button>
    <button class="dbtn on" data-d="normal">표준</button>
    <button class="dbtn" data-d="hard">익스트림</button>
  </div>
  <div class="dinfo" id="dinfo"><b>▸ 표준 코스</b><br>벽돌 깨기 15스테이지 · 보글보글 15라운드 · 테트리스 Lv3, 12분</div>
  <button class="gobtn" onclick="startTriathlon()">🏆 START</button>
</div>

<!-- GAME -->
<div class="screen" id="game" style="position:relative;">
  <button class="back-btn" id="backBtn" onclick="backToMenu()">◀ 메뉴</button>
  <div class="pbar" id="pbar"></div>
  <div class="ghdr" id="ghdr"></div>
  <canvas id="gameCanvas"></canvas>
  <div class="paddle-zone" id="paddleZone">
    <div class="pz-label">◀ 슬라이드로 패들 이동 ▶</div>
    <div class="pz-indicator" id="pzInd"></div>
    <div class="pz-launch" id="pzLaunch">발사</div>
  </div>
  <div class="tctrl" id="tctrl"></div>
</div>

<!-- TRANSITION -->
<div class="screen" id="trans"></div>
<!-- FINAL / SINGLE RESULT -->
<div class="screen" id="final"></div>
<!-- COUNTDOWN -->
<div id="cdown" class="hide"></div>

<script>
// roundRect polyfill for older Safari/iOS
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    else if (!Array.isArray(r)) r = [0, 0, 0, 0];
    const [tl, tr, br, bl] = r;
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y); this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br); this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h); this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl); this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
  };
}

// ================================================================
//  GLOBALS
// ================================================================
const DIFF = {
  easy:   { bStages:10, bRounds:10, tLevel:1, tTime:600, label:'입문 코스' },
  normal: { bStages:15, bRounds:15, tLevel:3, tTime:720, label:'표준 코스' },
  hard:   { bStages:20, bRounds:20, tLevel:5, tTime:900, label:'익스트림 코스' },
};
let selDiff = 'normal';
let curGame = 0;          // 0=brick 1=bubble 2=tetris
let scores = [0,0,0];
let details = [{},{},{}];
let gameActive = false;
let currentRAF = null;     // track animation frame
let currentKeyHandler = null; // track current key listener for cleanup

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let GW = 480, GH = 520;

// ================================================================
//  RESPONSIVE CANVAS
// ================================================================
function fitCanvas() {
  const maxW = Math.min(window.innerWidth - 12, 480);
  const s = maxW / GW;
  canvas.width = GW;
  canvas.height = GH;
  canvas.style.width = maxW + 'px';
  canvas.style.height = (GH * s) + 'px';
}
window.addEventListener('resize', fitCanvas);

// ================================================================
//  MENU
// ================================================================
document.querySelectorAll('.dbtn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.dbtn').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  selDiff = b.dataset.d;
  const d = DIFF[selDiff];
  document.getElementById('dinfo').innerHTML =
    `<b>▸ ${d.label}</b><br>벽돌 깨기 ${d.bStages}스테이지 · 보글보글 ${d.bRounds}라운드 · 테트리스 Lv${d.tLevel}, ${Math.floor(d.tTime/60)}분`;
}));

function showScr(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function updProg() {
  let h = '';
  for (let i = 0; i < 3; i++) {
    h += `<div class="pdot ${i < curGame ? 'dn' : i === curGame ? 'cur' : ''}"></div>`;
    if (i < 2) h += `<div class="pln ${i < curGame ? 'dn' : ''}"></div>`;
  }
  document.getElementById('pbar').innerHTML = h;
}

// ================================================================
//  CLEANUP — prevents listener leaks
// ================================================================
function cleanupGame() {
  gameActive = false;
  if (currentRAF) { cancelAnimationFrame(currentRAF); currentRAF = null; }
  if (currentKeyHandler) {
    document.removeEventListener('keydown', currentKeyHandler);
    document.removeEventListener('keyup', currentKeyHandler);
    currentKeyHandler = null;
  }
  cleanupTouch();
  cleanupPaddleZone();
  touchKeys = {};
}

function backToMenu() {
  cleanupGame();
  // Remove any stage-clear overlays
  document.querySelectorAll('.stage-clear').forEach(el => el.remove());
  showScr('menu');
}

// ================================================================
//  COUNTDOWN
// ================================================================
async function countdownAnim() {
  const el = document.getElementById('cdown');
  el.classList.remove('hide');
  for (let i = 3; i >= 1; i--) { el.textContent = i; await sleep(650); }
  el.textContent = 'GO!'; await sleep(350);
  el.classList.add('hide');
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ================================================================
//  START
// ================================================================
function startTriathlon() {
  curGame = 0; scores = [0,0,0]; details = [{},{},{}];
  document.getElementById('backBtn').style.display = 'block';
  showScr('game'); updProg(); launchGame(0);
}

async function launchGame(idx) {
  curGame = idx; updProg();
  await countdownAnim();
  gameActive = true;
  if (idx === 0) startBrick();
  else if (idx === 1) startBubble();
  else startTetris();
}

function endGame(score, detail) {
  cleanupGame();
  scores[curGame] = score;
  details[curGame] = detail;
  if (curGame < 2) showTrans();
  else showFinal();
}

// ================================================================
//  TRANSITION (between triathlon games)
// ================================================================
function showTrans() {
  const nm = ['벽돌 깨기','보글보글','테트리스'];
  const cl = ['var(--pink)','var(--grn)','var(--pur)'];
  const d = details[curGame];
  let dh = ''; for (const [k,v] of Object.entries(d)) dh += `<div>${k}<span>${v}</span></div>`;
  document.getElementById('trans').innerHTML = `
    <div class="pf" style="font-size:11px;color:${cl[curGame]};margin-bottom:6px;">${nm[curGame]} 완료!</div>
    <div class="tbox"><h3>종목 점수</h3><div class="tsc">${scores[curGame]}<small> / 100</small></div>
    <div class="tdet">${dh}</div></div>
    <div style="font-size:12px;color:var(--dim);margin:8px 0;">다음 종목:
      <span class="pf" style="font-size:9px;color:${cl[curGame+1]};">${nm[curGame+1]}</span></div>
    <button class="nbtn" onclick="showScr('game');launchGame(${curGame+1})">다음 종목 ▶</button>`;
  showScr('trans');
}

// ================================================================
//  FINAL TRIATHLON RESULT
// ================================================================
function showFinal() {
  const t = scores[0] + scores[1] + scores[2];
  let g, gc;
  if (t >= 270) { g='S'; gc='gs'; }
  else if (t >= 220) { g='A'; gc='ga'; }
  else if (t >= 160) { g='B'; gc='gb'; }
  else if (t >= 100) { g='C'; gc='gc'; }
  else { g='D'; gc='gd'; }
  document.getElementById('final').innerHTML = `
    <div class="pf" style="font-size:clamp(13px,3vw,20px);color:var(--yel);text-shadow:0 0 16px rgba(255,230,0,0.5);margin-bottom:6px;">🏆 경기 종료!</div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:16px;">${DIFF[selDiff].label} 완주</div>
    <div class="fcards">
      <div class="fcard c1"><div class="fi">🧱</div><div class="fn">벽돌 깨기</div><div class="fs">${scores[0]}</div><div class="fm">/ 100</div></div>
      <div class="fcard c2"><div class="fi">🫧</div><div class="fn">보글보글</div><div class="fs">${scores[1]}</div><div class="fm">/ 100</div></div>
      <div class="fcard c3"><div class="fi">🟪</div><div class="fn">테트리스</div><div class="fs">${scores[2]}</div><div class="fm">/ 100</div></div>
    </div>
    <div class="ftot"><div class="ftl">TOTAL SCORE</div><div class="fts">${t}<small> / 300</small></div>
    <div class="fgr ${gc}">RANK ${g}</div></div>
    <button class="rbtn" onclick="startTriathlon()">다시 도전</button>
    <button class="rbtn" style="border-color:var(--dim);color:var(--dim);margin-top:8px;" onclick="backToMenu()">메뉴로</button>`;
  showScr('final');
}

// ================================================================
//  STAGE CLEAR OVERLAY
// ================================================================
function stageClear(num, max, name, cb) {
  const ov = document.createElement('div');
  ov.className = 'stage-clear';
  const isLast = num >= max;
  ov.innerHTML = `<h2>STAGE ${num} CLEAR!</h2>
    <p>${name} — ${num} / ${max}</p>
    <button class="nbtn" id="__scb">${isLast ? '결과 보기' : '다음 스테이지 ▶'}</button>`;
  document.body.appendChild(ov);
  document.getElementById('__scb').onclick = () => { document.body.removeChild(ov); cb(); };
}

// ================================================================
//  TOUCH CONTROLS (Button-based, for Bubble & Tetris)
// ================================================================
let touchKeys = {};
let _touchCleanups = [];

function cleanupTouch() {
  _touchCleanups.forEach(fn => fn());
  _touchCleanups = [];
  touchKeys = {};
  // Remove pressed visual
  document.querySelectorAll('.tbtn.pressed').forEach(b => b.classList.remove('pressed'));
}

function setupTouch() {
  cleanupTouch();
  document.querySelectorAll('.tbtn').forEach(btn => {
    const key = btn.dataset.k;
    if (!key) return;
    let hi = null;

    function startH(e) {
      e.preventDefault();
      touchKeys[key] = true;
      btn.classList.add('pressed');
      document.dispatchEvent(new KeyboardEvent('keydown', { key }));
      if (['ArrowLeft','ArrowRight','ArrowDown'].includes(key)) {
        clearInterval(hi);
        hi = setInterval(() => {
          document.dispatchEvent(new KeyboardEvent('keydown', { key }));
        }, 70);
      }
    }
    function endH(e) {
      e.preventDefault();
      touchKeys[key] = false;
      btn.classList.remove('pressed');
      document.dispatchEvent(new KeyboardEvent('keyup', { key }));
      clearInterval(hi); hi = null;
    }

    btn.addEventListener('touchstart', startH, { passive: false });
    btn.addEventListener('touchend', endH, { passive: false });
    btn.addEventListener('touchcancel', endH, { passive: false });
    btn.addEventListener('mousedown', startH);
    btn.addEventListener('mouseup', endH);
    btn.addEventListener('mouseleave', endH);

    _touchCleanups.push(() => {
      btn.removeEventListener('touchstart', startH);
      btn.removeEventListener('touchend', endH);
      btn.removeEventListener('touchcancel', endH);
      btn.removeEventListener('mousedown', startH);
      btn.removeEventListener('mouseup', endH);
      btn.removeEventListener('mouseleave', endH);
      clearInterval(hi);
    });
  });
}

// ================================================================
//  PADDLE ZONE (Slider for Brick Breaker mobile)
// ================================================================
let _paddleCleanups = [];
let paddleTouchX = 0.5;  // 0~1 ratio
let paddleLaunch = false;

function cleanupPaddleZone() {
  _paddleCleanups.forEach(fn => fn());
  _paddleCleanups = [];
  paddleLaunch = false;
  document.getElementById('paddleZone').style.display = '';
  document.getElementById('tctrl').style.display = '';
}

function setupPaddleZone() {
  cleanupPaddleZone();
  const zone = document.getElementById('paddleZone');
  const ind = document.getElementById('pzInd');
  const launchBtn = document.getElementById('pzLaunch');

  // Show paddle zone, hide regular touch controls
  // (media query handles display:none/flex, override here)
  zone.style.display = 'block';
  document.getElementById('tctrl').style.display = 'none';

  function updateInd(ratio) {
    // Reserve right side for launch button (56px + 8px padding)
    const usable = zone.clientWidth - 72;
    ind.style.left = (ratio * usable) + 'px';
  }
  updateInd(0.5);

  function handleMove(clientX) {
    const rect = zone.getBoundingClientRect();
    const usable = rect.width - 72;
    const x = clientX - rect.left;
    const ratio = Math.max(0, Math.min(1, x / usable));
    paddleTouchX = ratio;
    updateInd(ratio);
  }

  function onTouchStart(e) {
    // Don't handle if touching the launch button
    if (e.target === launchBtn || launchBtn.contains(e.target)) return;
    e.preventDefault();
    const t = e.touches[0];
    handleMove(t.clientX);
  }
  function onTouchMove(e) {
    e.preventDefault();
    const t = e.touches[0];
    handleMove(t.clientX);
  }
  function onMouseDown(e) {
    if (e.target === launchBtn) return;
    handleMove(e.clientX);
    const mm = (ev) => handleMove(ev.clientX);
    const mu = () => { document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); };
    document.addEventListener('mousemove', mm);
    document.addEventListener('mouseup', mu);
  }

  function onLaunchStart(e) { e.preventDefault(); paddleLaunch = true; launchBtn.classList.add('pressed'); }
  function onLaunchEnd(e) { e.preventDefault(); paddleLaunch = false; launchBtn.classList.remove('pressed'); }

  zone.addEventListener('touchstart', onTouchStart, { passive: false });
  zone.addEventListener('touchmove', onTouchMove, { passive: false });
  zone.addEventListener('mousedown', onMouseDown);
  launchBtn.addEventListener('touchstart', onLaunchStart, { passive: false });
  launchBtn.addEventListener('touchend', onLaunchEnd, { passive: false });
  launchBtn.addEventListener('mousedown', onLaunchStart);
  launchBtn.addEventListener('mouseup', onLaunchEnd);

  _paddleCleanups.push(() => {
    zone.removeEventListener('touchstart', onTouchStart);
    zone.removeEventListener('touchmove', onTouchMove);
    zone.removeEventListener('mousedown', onMouseDown);
    launchBtn.removeEventListener('touchstart', onLaunchStart);
    launchBtn.removeEventListener('touchend', onLaunchEnd);
    launchBtn.removeEventListener('mousedown', onLaunchStart);
    launchBtn.removeEventListener('mouseup', onLaunchEnd);
  });
}


// ================================================================
//  GAME 1 — BRICK BREAKER
// ================================================================
function startBrick() {
  const diff = DIFF[selDiff];
  const maxStg = diff.bStages;
  GW = 480; GH = 520; fitCanvas();

  let stg = 1, lives = 7, raw = 0, t0 = Date.now();
  const PW = 80, PH = 12;
  let px = (GW - PW) / 2;
  const BR = 6;
  let bx = GW/2, by = GH - 40 - BR, bdx = 0, bdy = 0, launched = false;
  let bricks = [];
  const bColors = ['#ff006e','#ff6a00','#ffe600','#39ff14','#00fff5','#b026ff'];

  function mkBricks() {
    bricks = [];
    const rows = Math.min(3 + Math.floor(stg / 3), 8);
    const cols = 8;
    const bw = Math.floor((GW - 24) / cols) - 4;
    const bh = 16, pad = 4;
    const ox = (GW - cols * (bw + pad) + pad) / 2;
    const oy = 36;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        let h = 1;
        if (stg > 5 && r < 1) h = 2;
        if (stg > 12 && r < 2) h = 2;
        if (stg > 17 && r < 1) h = 3;
        bricks.push({ x: ox + c*(bw+pad), y: oy + r*(bh+pad), w: bw, h: bh,
          color: bColors[r % 6], alive: true, hits: h, mh: h });
      }
    }
  }

  function hdr() {
    document.getElementById('ghdr').innerHTML =
      `<div class="gtitle c1 pf">1종목: 벽돌 깨기</div>
       <div class="gstats"><span>STG <em id="bs">${stg}</em>/${maxStg}</span>
       <span>♥ <em id="bl">${lives}</em></span><span>PTS <em id="bp">${raw}</em></span></div>`;
  }
  hdr();

  // Detect device type
  const isMobile = window.matchMedia('(pointer:coarse)').matches || window.innerWidth <= 520;

  if (isMobile) {
    setupPaddleZone();
  } else {
    // PC: hide paddle zone, show keyboard touch controls as fallback
    document.getElementById('paddleZone').style.display = 'none';
    document.getElementById('tctrl').innerHTML =
      `<button class="tbtn" data-k="ArrowLeft">◀</button>
       <button class="tbtn tbtn-w" data-k=" ">발사</button>
       <button class="tbtn" data-k="ArrowRight">▶</button>`;
    document.getElementById('tctrl').style.display = 'none'; // PC doesn't need touch buttons
    setupTouch();
  }

  // Keyboard
  const keys = {};
  function onK(e) {
    if (!gameActive) return;
    keys[e.key] = e.type === 'keydown';
    if (e.key === ' ') e.preventDefault();
  }
  document.addEventListener('keydown', onK);
  document.addEventListener('keyup', onK);
  currentKeyHandler = onK;

  const bSpd = 3.5 + (selDiff === 'hard' ? 1 : selDiff === 'easy' ? -0.5 : 0);

  function resetBall() {
    launched = false;
    bx = px + PW / 2;
    by = GH - 40 - PH - BR;
    bdx = 0; bdy = 0;
  }

  function launchBall() {
    if (launched) return;
    launched = true;
    const s = bSpd + stg * 0.08;
    const a = -Math.PI/2 + (Math.random() - 0.5) * 0.7;
    bdx = Math.cos(a) * s;
    bdy = Math.sin(a) * s;
    if (bdy > 0) bdy = -bdy;
  }

  mkBricks();

  function update() {
    // Paddle movement
    if (isMobile) {
      // Smooth slide to touch position
      const targetX = paddleTouchX * (GW - PW);
      px += (targetX - px) * 0.25;
      px = Math.max(0, Math.min(GW - PW, px));
      if (paddleLaunch) launchBall();
    } else {
      if (keys['ArrowLeft']) px = Math.max(0, px - 7);
      if (keys['ArrowRight']) px = Math.min(GW - PW, px + 7);
      if (keys[' ']) launchBall();
    }

    if (!launched) {
      bx = px + PW/2;
      by = GH - 40 - PH - BR;
      return;
    }

    bx += bdx; by += bdy;

    // Walls
    if (bx - BR < 0) { bx = BR; bdx = Math.abs(bdx); }
    if (bx + BR > GW) { bx = GW - BR; bdx = -Math.abs(bdx); }
    if (by - BR < 0) { by = BR; bdy = Math.abs(bdy); }

    // Paddle
    const py2 = GH - 40 - PH;
    if (bdy > 0 && by + BR >= py2 && by + BR <= py2 + PH + 8 && bx >= px - 4 && bx <= px + PW + 4) {
      const hit = (bx - px) / PW - 0.5;
      const spd = Math.sqrt(bdx*bdx + bdy*bdy);
      const ang = hit * Math.PI * 0.65;
      bdx = Math.sin(ang) * spd;
      bdy = -Math.abs(Math.cos(ang) * spd);
      by = py2 - BR;
    }

    // Floor — lose life
    if (by > GH + 10) {
      lives--;
      document.getElementById('bl').textContent = lives;
      if (lives <= 0) { fin(); return; }
      resetBall();
    }

    // Bricks
    for (const b of bricks) {
      if (!b.alive) continue;
      if (bx + BR > b.x && bx - BR < b.x + b.w && by + BR > b.y && by - BR < b.y + b.h) {
        b.hits--;
        if (b.hits <= 0) { b.alive = false; raw += 10 * b.mh; }
        bdy = -bdy;
        document.getElementById('bp').textContent = raw;
        break;
      }
    }

    // Stage clear
    if (bricks.every(b => !b.alive)) {
      if (stg >= maxStg) { fin(); return; }
      gameActive = false;
      cancelAnimationFrame(currentRAF);
      stageClear(stg, maxStg, '벽돌 깨기', () => {
        stg++; hdr(); mkBricks(); resetBall();
        gameActive = true; loop();
      });
    }
  }

  function draw() {
    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(0, 0, GW, GH);

    // Bricks
    for (const b of bricks) {
      if (!b.alive) continue;
      ctx.fillStyle = b.color;
      ctx.globalAlpha = 0.4 + 0.6 * (b.hits / b.mh);
      ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 3); ctx.fill();
      ctx.globalAlpha = 1;
      if (b.mh > 1) {
        ctx.fillStyle = '#fff'; ctx.font = 'bold 9px "Press Start 2P"'; ctx.textAlign = 'center';
        ctx.fillText(b.hits, b.x + b.w/2, b.y + b.h/2 + 4);
      }
    }

    // Paddle
    ctx.fillStyle = '#00fff5';
    ctx.shadowColor = 'rgba(0,255,245,0.5)'; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.roundRect(px, GH - 40 - PH, PW, PH, 6); ctx.fill();
    ctx.shadowBlur = 0;

    // Ball
    ctx.fillStyle = '#fff'; ctx.shadowColor = 'rgba(255,255,255,0.8)'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(bx, by, BR, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // Lives
    ctx.fillStyle = '#ff006e'; ctx.font = '9px "Press Start 2P"'; ctx.textAlign = 'left';
    ctx.fillText('♥'.repeat(Math.min(lives, 7)), 6, GH - 10);
  }

  function fin() {
    const el = (Date.now() - t0) / 1000;
    const ss = Math.round((stg / maxStg) * 60);
    const ls = Math.round((lives / 7) * 20);
    const tb = Math.round(Math.max(0, 10 - el / 60));
    const rb = Math.min(10, Math.round(raw / (maxStg * 80) * 10));
    endGame(Math.min(100, ss + ls + tb + rb),
      { '스테이지': `${stg}/${maxStg}`, '남은 목숨': lives, '점수': raw, '시간': `${Math.floor(el)}초` });
  }

  function loop() {
    if (!gameActive) return;
    update(); draw();
    currentRAF = requestAnimationFrame(loop);
  }
  resetBall(); loop();
}


// ================================================================
//  GAME 2 — BUBBLE BOBBLE
// ================================================================
function startBubble() {
  const diff = DIFF[selDiff];
  const maxR = diff.bRounds;
  GW = 480; GH = 520; fitCanvas();

  // Hide paddle zone, show normal touch controls
  document.getElementById('paddleZone').style.display = 'none';
  document.getElementById('tctrl').innerHTML =
    `<button class="tbtn" data-k="ArrowLeft">◀</button>
     <button class="tbtn" data-k="ArrowUp">▲</button>
     <button class="tbtn" data-k=" ">🫧</button>
     <button class="tbtn" data-k="ArrowRight">▶</button>`;
  setupTouch();

  let rnd = 1, lives = 7, score = 0, kills = 0, qc = 0, mk = 0, t0 = Date.now();
  const P = { x:60, y:440, w:22, h:26, vx:0, vy:0, dir:1, og:false };
  let plats = [], ens = [], bubs = [], caps = [], parts = [];

  function genLvl() {
    plats = []; ens = []; bubs = []; caps = [];
    plats.push({ x:0, y:490, w:GW, h:30 });
    plats.push({ x:0, y:0, w:14, h:GH });
    plats.push({ x:GW-14, y:0, w:14, h:GH });
    const np = 3 + Math.min(Math.floor(rnd * 0.6), 6);
    for (let i = 0; i < np; i++) {
      const pw = 50 + Math.random() * 70;
      const ppx = 20 + Math.random() * (GW - 40 - pw);
      const py = 80 + i * (380 / np);
      plats.push({ x: ppx, y: py, w: pw, h: 10 });
    }
    const ne = Math.min(2 + Math.floor(rnd * 0.6), 7);
    for (let i = 0; i < ne; i++) {
      const pidx = 3 + Math.floor(Math.random() * Math.max(1, plats.length - 3));
      const ep = plats[pidx];
      if (!ep) continue;
      ens.push({
        x: ep.x + Math.random() * Math.max(0, ep.w - 18),
        y: ep.y - 20, w: 18, h: 18,
        vx: (1 + Math.random()*0.5 + rnd*0.12) * (Math.random() > 0.5 ? 1 : -1),
        vy: 0, alive: true, cap: false, ct: 0,
        color: ['#ff006e','#ff6a00','#b026ff','#00fff5','#ffe600'][i % 5]
      });
    }
    P.x = 60; P.y = 440; P.vx = 0; P.vy = 0;
  }

  function hdr() {
    document.getElementById('ghdr').innerHTML =
      `<div class="gtitle c2 pf">2종목: 보글보글</div>
       <div class="gstats"><span>RND <em>${rnd}</em>/${maxR}</span>
       <span>♥ <em id="bbl">${lives}</em></span><span>PTS <em id="bbs">${score}</em></span></div>`;
  }
  hdr(); genLvl();

  const keys = {};
  function onK(e) {
    if (!gameActive) return;
    keys[e.key] = e.type === 'keydown';
    if ([' ','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
  }
  document.addEventListener('keydown', onK);
  document.addEventListener('keyup', onK);
  currentKeyHandler = onK;

  let bc = 0, rt0 = Date.now();

  function update() {
    if (keys['ArrowLeft'] || touchKeys['ArrowLeft']) { P.vx = -4; P.dir = -1; }
    else if (keys['ArrowRight'] || touchKeys['ArrowRight']) { P.vx = 4; P.dir = 1; }
    else P.vx *= 0.7;

    if ((keys['ArrowUp'] || touchKeys['ArrowUp']) && P.og) { P.vy = -9; P.og = false; }
    P.vy += 0.5; P.x += P.vx; P.y += P.vy;
    P.og = false;

    for (const pl of plats) {
      if (P.x + P.w > pl.x && P.x < pl.x + pl.w && P.vy >= 0 &&
          P.y + P.h >= pl.y && P.y + P.h <= pl.y + pl.h + 10) {
        P.y = pl.y - P.h; P.vy = 0; P.og = true;
      }
      if (pl.w === 14) {
        if (P.x < pl.x + pl.w && pl.x < 100) P.x = pl.x + pl.w;
        if (P.x + P.w > pl.x && pl.x > 100) P.x = pl.x - P.w;
      }
    }
    if (P.y > GH) P.y = -P.h;
    if (P.y < -P.h) P.y = GH;

    if (bc > 0) bc--;
    if ((keys[' '] || touchKeys[' ']) && bc <= 0) {
      bubs.push({ x: P.x+P.w/2, y: P.y+6, vx: P.dir*5, vy: -0.5, life: 80, r: 9 });
      bc = 15;
    }

    for (let i = bubs.length-1; i >= 0; i--) {
      const b = bubs[i];
      b.x += b.vx; b.y += b.vy; b.vx *= 0.97; b.vy -= 0.02; b.life--;
      if (b.life <= 0 || b.x < 0 || b.x > GW || b.y < -20) { bubs.splice(i, 1); continue; }
      for (const e of ens) {
        if (!e.alive || e.cap) continue;
        if (Math.abs(b.x - e.x - e.w/2) < 16 && Math.abs(b.y - e.y - e.h/2) < 16) {
          e.cap = true; e.ct = 200; caps.push(e); bubs.splice(i, 1); break;
        }
      }
    }

    for (let ci = caps.length - 1; ci >= 0; ci--) {
      const e = caps[ci];
      if (!e.cap) continue;
      e.y -= 0.4; e.ct--;
      if (e.ct <= 0) { e.cap = false; e.vy = 0; caps.splice(ci, 1); }
    }

    let batch = 0;
    for (let i = caps.length-1; i >= 0; i--) {
      const e = caps[i];
      if (Math.abs(P.x + P.w/2 - e.x - e.w/2) < 22 && Math.abs(P.y + P.h/2 - e.y - e.h/2) < 22) {
        e.alive = false; e.cap = false; caps.splice(i, 1);
        kills++; batch++; score += 100;
        for (let p = 0; p < 5; p++)
          parts.push({ x:e.x+e.w/2, y:e.y+e.h/2, vx:(Math.random()-.5)*4, vy:(Math.random()-.5)*4, life:25, color:e.color });
      }
    }
    if (batch > 1) { mk++; score += batch * 50; }

    for (const e of ens) {
      if (!e.alive || e.cap) continue;
      e.x += e.vx; e.vy += 0.4; e.y += e.vy;
      for (const pl of plats) {
        if (e.x+e.w > pl.x && e.x < pl.x+pl.w && e.vy >= 0 &&
            e.y+e.h >= pl.y && e.y+e.h <= pl.y+pl.h+8) { e.y = pl.y - e.h; e.vy = 0; }
        if (pl.w === 14) {
          if (e.x < pl.x+pl.w && pl.x < 100) { e.x = pl.x+pl.w; e.vx = Math.abs(e.vx); }
          if (e.x+e.w > pl.x && pl.x > 100) { e.x = pl.x-e.w; e.vx = -Math.abs(e.vx); }
        }
      }
      if (e.y > GH) e.y = -e.h;
      if (Math.abs(P.x+P.w/2 - e.x-e.w/2) < 16 && Math.abs(P.y+P.h/2 - e.y-e.h/2) < 16) {
        lives--; document.getElementById('bbl').textContent = lives;
        if (lives <= 0) { fin(); return; }
        P.x = 60; P.y = 440; P.vx = 0; P.vy = 0;
      }
    }

    for (let i = parts.length-1; i >= 0; i--) {
      parts[i].x += parts[i].vx; parts[i].y += parts[i].vy; parts[i].life--;
      if (parts[i].life <= 0) parts.splice(i, 1);
    }
    document.getElementById('bbs').textContent = score;

    if (ens.every(e => !e.alive)) {
      const rt = (Date.now() - rt0) / 1000;
      if (rt < 15) qc++;
      if (rnd >= maxR) { fin(); return; }
      gameActive = false; cancelAnimationFrame(currentRAF);
      stageClear(rnd, maxR, '보글보글', () => {
        rnd++; hdr(); genLvl(); rt0 = Date.now(); gameActive = true; loop();
      });
    }
  }

  function draw() {
    ctx.fillStyle = '#060618'; ctx.fillRect(0, 0, GW, GH);
    for (const pl of plats) {
      ctx.fillStyle = (pl.w > 100 && pl.h === 30) ? '#1a1a3a' : pl.w === 14 ? '#1a1a3a' : '#2a2a4a';
      ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
    }
    for (const b of bubs) {
      ctx.strokeStyle = `rgba(57,255,20,${b.life/80})`; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.stroke();
    }
    for (const e of ens) {
      if (!e.alive) continue;
      if (e.cap) {
        ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(e.x+e.w/2, e.y+e.h/2, 13, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha = 0.6;
      }
      ctx.fillStyle = e.color; ctx.fillRect(e.x, e.y, e.w, e.h);
      ctx.fillStyle = '#fff'; ctx.fillRect(e.x+3, e.y+4, 4, 4); ctx.fillRect(e.x+11, e.y+4, 4, 4);
      ctx.fillStyle = '#000'; ctx.fillRect(e.x+5, e.y+6, 2, 2); ctx.fillRect(e.x+13, e.y+6, 2, 2);
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = '#39ff14'; ctx.shadowColor = 'rgba(57,255,20,0.5)'; ctx.shadowBlur = 8;
    ctx.fillRect(P.x, P.y, P.w, P.h);
    ctx.fillStyle = '#fff'; ctx.fillRect(P.x+4, P.y+5, 4, 4); ctx.fillRect(P.x+13, P.y+5, 4, 4);
    ctx.fillRect(P.x+5, P.y+16, 10, 3); ctx.shadowBlur = 0;
    for (const p of parts) {
      ctx.globalAlpha = p.life/25; ctx.fillStyle = p.color; ctx.fillRect(p.x-2, p.y-2, 4, 4);
    }
    ctx.globalAlpha = 1;
  }

  function fin() {
    const rs = Math.round((rnd/maxR) * 50);
    const ls = Math.round((lives/7) * 20);
    const cb = Math.round(Math.min(20, (qc/maxR) * 20));
    const mb = Math.min(10, mk * 3);
    endGame(Math.min(100, rs + ls + cb + mb),
      { '라운드': `${rnd}/${maxR}`, '남은 목숨': lives, '처치': kills, '멀티킬': mk });
  }

  function loop() {
    if (!gameActive) return;
    update(); draw();
    currentRAF = requestAnimationFrame(loop);
  }
  loop();
}

  const OX = (GW - COLS*CELL) / 2, OY = 10;
  const board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

  const PC = [
    { s: [[1,1,1,1]], c: '#00fff5' },
    { s: [[1,1],[1,1]], c: '#ffe600' },
    { s: [[0,1,0],[1,1,1]], c: '#b026ff' },
    { s: [[1,0,0],[1,1,1]], c: '#ff6a00' },
    { s: [[0,0,1],[1,1,1]], c: '#0066ff' },
    { s: [[0,1,1],[1,1,0]], c: '#39ff14' },
    { s: [[1,1,0],[0,1,1]], c: '#ff006e' },
  ];

  let lv = sLv, lns = 0, tc = 0, t0 = Date.now(), go = false;
  let cur, cx, cy, cc, nxt;

  function spd() { return Math.max(50, 500 - lv * 40); }
  function rp() { const p = PC[Math.floor(Math.random() * PC.length)]; return { s: p.s.map(r=>[...r]), c: p.c }; }

  function spawn() {
    if (nxt) { cur = nxt.s; cc = nxt.c; }
    else { const p = rp(); cur = p.s; cc = p.c; }
    const np = rp(); nxt = { s: np.s, c: np.c };
    cx = Math.floor((COLS - cur[0].length) / 2); cy = 0;
    if (col(cur, cx, cy)) { go = true; fin(); }
  }

  function col(pc, px, py) {
    for (let r = 0; r < pc.length; r++)
      for (let c = 0; c < pc[r].length; c++) {
        if (!pc[r][c]) continue;
        const nx = px + c, ny = py + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
        if (ny >= 0 && board[ny][nx]) return true;
      }
    return false;
  }

  function lock() {
    for (let r = 0; r < cur.length; r++)
      for (let c = 0; c < cur[r].length; c++) {
        if (!cur[r][c]) continue;
        const ny = cy + r;
        if (ny < 0) { go = true; fin(); return; }
        board[ny][cx + c] = cc;
      }
    clr(); spawn();
  }

  function clr() {
    let cl = 0;
    for (let r = ROWS-1; r >= 0; r--) {
      if (board[r].every(c => c)) {
        board.splice(r, 1); board.unshift(Array(COLS).fill(0)); cl++; r++;
      }
    }
    if (cl > 0) {
      lns += cl; if (cl === 4) tc++;
      lv = sLv + Math.floor(lns / 10);
      document.getElementById('tln').textContent = lns;
      document.getElementById('tlv').textContent = lv;
      document.getElementById('ttr').textContent = tc;
    }
  }

  function rot() {
    const rows = cur.length, cols = cur[0].length, rt = [];
    for (let c = 0; c < cols; c++) {
      const nr = [];
      for (let r = rows-1; r >= 0; r--) nr.push(cur[r][c]);
      rt.push(nr);
    }
    for (const k of [0, -1, 1, -2, 2])
      if (!col(rt, cx+k, cy)) { cur = rt; cx += k; return; }
  }

  function hardDrop() { while (!col(cur, cx, cy+1)) cy++; lock(); }
  function ghostY() { let g = cy; while (!col(cur, cx, g+1)) g++; return g; }

  const keys = {};
  function onK(e) {
    if (!gameActive || go) return;
    if (['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' '].includes(e.key)) e.preventDefault();
    if (e.type === 'keydown') {
      if (!keys[e.key]) {
        keys[e.key] = true;
        if (e.key === 'ArrowLeft') { if (!col(cur, cx-1, cy)) cx--; }
        else if (e.key === 'ArrowRight') { if (!col(cur, cx+1, cy)) cx++; }
        else if (e.key === 'ArrowDown') { if (!col(cur, cx, cy+1)) cy++; }
        else if (e.key === 'ArrowUp') rot();
        else if (e.key === ' ') hardDrop();
      }
    } else {
      keys[e.key] = false;
    }
  }
  document.addEventListener('keydown', onK);
  document.addEventListener('keyup', onK);
  currentKeyHandler = onK;

  let dL = 0, dR = 0, dD = 0;
  function das() {
    if (keys['ArrowLeft'] || touchKeys['ArrowLeft']) { dL++; if (dL > 10 && dL%3 === 0 && !col(cur, cx-1, cy)) cx--; } else dL = 0;
    if (keys['ArrowRight'] || touchKeys['ArrowRight']) { dR++; if (dR > 10 && dR%3 === 0 && !col(cur, cx+1, cy)) cx++; } else dR = 0;
    if (keys['ArrowDown'] || touchKeys['ArrowDown']) { dD++; if (dD > 3 && dD%2 === 0 && !col(cur, cx, cy+1)) cy++; } else dD = 0;
  }

  spawn(); let dt = 0;

  function update() {
    const el = (Date.now() - t0) / 1000;
    const rem = Math.max(0, maxTime - el);
    document.getElementById('tt').textContent =
      `${Math.floor(rem/60)}:${Math.floor(rem%60).toString().padStart(2, '0')}`;
    if (rem <= 0) { fin(); return; }
    das(); dt++;
    if (dt >= spd() / 16) {
      dt = 0;
      if (!col(cur, cx, cy+1)) cy++; else lock();
    }
  }

  function draw() {
    ctx.fillStyle = '#08081a'; ctx.fillRect(0, 0, GW, GH);
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    ctx.strokeRect(OX-2, OY-2, COLS*CELL+4, ROWS*CELL+4);

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const x = OX + c*CELL, y = OY + r*CELL;
        if (board[r][c]) {
          ctx.fillStyle = board[r][c]; ctx.fillRect(x+1, y+1, CELL-2, CELL-2);
          ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fillRect(x+1, y+1, CELL-2, 3);
        } else {
          ctx.fillStyle = '#0d0d20'; ctx.fillRect(x, y, CELL, CELL);
          ctx.strokeStyle = '#181830'; ctx.lineWidth = 0.5; ctx.strokeRect(x, y, CELL, CELL);
        }
      }
    }

    if (cur) {
      // Ghost
      const g = ghostY();
      ctx.globalAlpha = 0.2;
      for (let r = 0; r < cur.length; r++)
        for (let c = 0; c < cur[r].length; c++) {
          if (!cur[r][c]) continue;
          ctx.fillStyle = cc; ctx.fillRect(OX+(cx+c)*CELL+1, OY+(g+r)*CELL+1, CELL-2, CELL-2);
        }
      ctx.globalAlpha = 1;

      // Current piece
      for (let r = 0; r < cur.length; r++)
        for (let c = 0; c < cur[r].length; c++) {
          if (!cur[r][c]) continue;
          const x = OX + (cx+c)*CELL, y = OY + (cy+r)*CELL;
          ctx.fillStyle = cc; ctx.shadowColor = cc; ctx.shadowBlur = 6;
          ctx.fillRect(x+1, y+1, CELL-2, CELL-2);
          ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillRect(x+1, y+1, CELL-2, 3);
          ctx.shadowBlur = 0;
        }
    }

    // Next piece preview
    if (nxt) {
      ctx.fillStyle = '#fff'; ctx.font = '8px "Press Start 2P"'; ctx.textAlign = 'left';
      ctx.fillText('NEXT', OX + COLS*CELL + 12, OY + 16);
      for (let r = 0; r < nxt.s.length; r++)
        for (let c = 0; c < nxt.s[r].length; c++) {
          if (!nxt.s[r][c]) continue;
          ctx.fillStyle = nxt.c;
          ctx.fillRect(OX + COLS*CELL + 14 + c*14, OY + 24 + r*14, 12, 12);
        }
    }
  }

  function fin() {
    const el = Math.min(maxTime, (Date.now() - t0) / 1000);
    const ss = Math.round((el / maxTime) * 35);
    const ls2 = Math.round(Math.min(25, lns / (maxTime / 30) * 25));
    const lvs = Math.round(Math.min(20, ((lv - sLv) / 5) * 20));
    const ts = Math.round(Math.min(20, tc * 5));
    endGame(Math.min(100, ss + ls2 + lvs + ts),
      { '생존 시간': `${Math.floor(el)}초/${maxTime}초`, '삭제 줄': lns, '레벨': lv, '테트리스': tc });
  }

  function loop() {
    if (!gameActive || go) return;
    update(); draw();
    currentRAF = requestAnimationFrame(loop);
  }
  loop();
}
</script>
</body>
</html>
